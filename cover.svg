<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Deep Dark Charcoal Background -->
  <rect width="1280" height="640" fill="#121212" />
  
  <!-- Terminal Border Top -->
  <rect x="0" y="0" width="1280" height="40" fill="#1e1e1e" />
  <circle cx="30" cy="20" r="6" fill="#f92672" opacity="0.8" />
  <circle cx="50" cy="20" r="6" fill="#e6db74" opacity="0.8" />
  <circle cx="70" cy="20" r="6" fill="#6f9427" opacity="0.8" />

  <!-- Codeblock Content -->
  <g transform="translate(100, 350)" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace">
    <!-- _bq -->
    <!-- JetBrains Mono styling, neon colors -->
    <text x="0" y="0" font-size="180" font-weight="700" fill="#c5c8c6" letter-spacing="-5">> bq</text>
    
    <!-- Subtitle -->
    <text x="15" y="150" font-size="32" font-weight="500" fill="#8f908a" letter-spacing="1">M2M SDKs for Financial knowledge graphs <tspan fill="#e6db74">X402</tspan></text>
  </g>

  <!-- Syntax Highlighting accents -->
  <g transform="translate(100, 500)" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="20" fill="#75715e">
    <text x="15" y="30">Target: <tspan fill="#66d9ef">api.heyaia.org/m2m</tspan></text>
  </g>
</svg>
