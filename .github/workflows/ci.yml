name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build SDK
        working-directory: bubbleq-sdk-ts
        run: |
          npm install
          npm run build

      - name: Test MCP Server
        working-directory: bubbleq-mcp-server
        run: |
          npm install
          npm test
