name: Bubbleq CI Pipeline

# This tells GitHub to run these tests every time someone pushes to the "main" branch, 
# or opens a Pull Request proposing changes to the "main" branch.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Test our TypeScript/Node.js Code
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Download the code onto the server
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and test TypeScript SDK
        working-directory: ./bubbleq-sdk-ts
        run: |
          npm install
          npm test

      - name: Install dependencies and test MCP Server
        working-directory: ./bubbleq-mcp-server
        run: |
          npm install
          npm test

  # JOB 2: Test our Python Code
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Download the code onto the server
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies and test Python SDK
        working-directory: ./bubbleq-sdk-py
        run: |
          pip install -e .[test]
          pytest
